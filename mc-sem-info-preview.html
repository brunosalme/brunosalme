<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
    padding: 32px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  }

  p.hint {
    color: #555;
    font-size: 13px;
    text-align: center;
    max-width: 400px;
    line-height: 1.5;
  }

  /* ─── Canvas 1080×1920, escalado para 324×576 (30%) ─── */
  .story {
    position: relative;
    width: 324px;
    height: 576px;
    overflow: hidden;
    border-radius: 10px;
    box-shadow: 0 0 0 1px #333, 0 20px 60px rgba(0,0,0,0.8);

    /* Troque pela URL da imagem exportada do Canva */
    background: #000;
  }

  /*
    Escala: 30% do original (1080×1920)
    Posições abaixo já convertidas para 30%.

    Original (Canva):
      date  → top: 282px,  left: center (563px width)
      dica  → top: 620px,  left: 73px
  */

  .date {
    position: absolute;
    top: 84.6px;   /* 282 × 0.3 */
    left: 0;
    right: 0;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 8.4px;   /* ~28px original × 0.3 */
    font-weight: 400;
    color: #aaa;
    letter-spacing: 0.2px;
  }

  .dica {
    position: absolute;
    top: 186px;    /* 620 × 0.3 */
    left: 21.9px;  /* 73 × 0.3 */
    right: 21.9px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 9px;    /* ~30px original × 0.3 */
    font-weight: 400;
    font-style: italic;
    color: #ccc;
    line-height: 1.45;
  }

  /* ── Guias visuais (remover na versão final) ── */
  .guide-date {
    position: absolute;
    top: 84.6px;
    left: 0; right: 0;
    height: 1px;
    background: rgba(0,120,255,0.4);
  }
  .guide-dica {
    position: absolute;
    top: 186px;
    left: 21.9px; right: 21.9px;
    height: 1px;
    background: rgba(255,80,0,0.4);
  }
</style>
</head>
<body>

<p class="hint">
  Substitua o fundo preto pela imagem PNG exportada do Canva.<br>
  <code style="color:#555;font-size:11px">background-image: url('seu-fundo.png'); background-size: cover;</code>
</p>

<div class="story">

  <!-- Guias de posicionamento -->
  <div class="guide-date"></div>
  <div class="guide-dica"></div>

  <!-- Textos dinâmicos -->
  <div class="date">20 de junho de 2026 às 09:00</div>
  <div class="dica">Dica: o mercado fecha, mas a geladeira não.</div>

</div>

<p class="hint" style="color:#444">
  Linha azul = posição da data &nbsp;|&nbsp; Linha laranja = posição da dica
</p>

</body>
</html>
