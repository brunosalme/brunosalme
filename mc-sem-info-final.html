<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  }

  /* 828×1792 escalado para 373×806 (45%) */
  .story {
    position: relative;
    width: 373px;
    height: 806px;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 0 0 1px #222, 0 24px 80px rgba(0,0,0,0.9);
    background: #000;
  }

  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
  }

  /*
    Posições originais no Canva (1080×1920):
      date → top: 282px, centralizado
      dica → top: 620px, left: 73px

    Escala para 828×1792 (proporção diferente):
      date → top: ~14.7% → 118px em 806px de altura
      dica → top: ~32.3% → 260px em 806px de altura
      left dica → ~6.7% → 25px em 373px de largura
  */

  .date {
    position: absolute;
    top: 118px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: #999;
    letter-spacing: 0.1px;
  }

  .dica {
    position: absolute;
    top: 260px;
    left: 25px;
    right: 25px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 14px;
    font-weight: 400;
    font-style: italic;
    color: #ddd;
    line-height: 1.45;
  }
</style>
</head>
<body>

<div class="story">
  <!-- Salve a imagem de fundo como "background.png" na mesma pasta -->
  <img class="bg" src="background.png" alt="">

  <div class="date">20 de junho de 2026 às 09:00</div>
  <div class="dica">Dica: o mercado fecha, mas a geladeira não.</div>
</div>

</body>
</html>
