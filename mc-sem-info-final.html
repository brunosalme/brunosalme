<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
  }

  /*
    Canvas Canva: 1080×1920 (9:16)
    Escala de preview: 40% → 432×768px

    Posições originais (1080×1920) × 0.4:
      date → top: 282px × 0.4 = 113px  | centralizado
      dica → top: 620px × 0.4 = 248px  | left: 73px × 0.4 = 29px
  */
  .story {
    position: relative;
    width: 432px;
    height: 768px;
    overflow: hidden;
    border-radius: 12px;
    box-shadow: 0 0 0 1px #222, 0 24px 80px rgba(0,0,0,0.9);
    background: #000;
  }

  .bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .date {
    position: absolute;
    top: 113px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: #999;
    letter-spacing: 0.1px;
  }

  /* top original: 482px × 0.4 = 193px */
  .main-text {
    position: absolute;
    top: 193px;
    left: 29px;
    right: 29px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 13px;
    font-weight: 400;
    font-style: normal;
    color: #fff;
    line-height: 1.45;
  }

  /* top original: 620px × 0.4 = 248px */
  .dica {
    position: absolute;
    top: 248px;
    left: 29px;
    right: 29px;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    font-size: 13px;
    font-weight: 400;
    font-style: italic;
    color: #ddd;
    line-height: 1.45;
  }
</style>
</head>
<body>

<div class="story">
  <!-- Salve a imagem de fundo como "background.png" na mesma pasta -->
  <img class="bg" src="background.png" alt="">

  <div class="date">20 de junho de 2026 às 09:00</div>
  <div class="main-text">Hoje não tem dados de mercado.</div>
  <div class="dica">Dica: o mercado fecha, mas a geladeira não.</div>
</div>

</body>
</html>
